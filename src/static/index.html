<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymMatch — Find Your Perfect Gym</title>
</head>
<body>
    <header>
        <h1>GymMatch SG</h1>
        <a class="header-link" href="/profile">Profile</a>
    </header>

    <main>
        <section class="filters">
            <h2>Your Preferences</h2>

            <div class="filter-group">
                <label for="user_id">User ID</label>
                <div class="button-row">
                    <input type="text" id="user_id" value="demo_user" placeholder="Enter user ID">
                    <button id="load-profile-btn" type="button">Load Profile</button>
                </div>
                <div id="profile-status"></div>
            </div>
            
            <div class="filter-group">
                <label>Max Monthly Budget (S$)</label>
                <input type="number" id="budget" value="150" min="20">
            </div>

            <div class="filter-group">
                <label>Max Distance (km)</label>
                <input type="number" id="distance" value="5" min="1">
            </div>

            <div class="filter-group">
                <label>Requirements</label>
                <div class="checkbox-group">
                    <label class="checkbox-item"><input type="checkbox" id="access_24h" checked> 24/7 Access</label>
                    <label class="checkbox-item"><input type="checkbox" id="requires_classes"> Group Classes</label>
                    <label class="checkbox-item"><input type="checkbox" id="requires_shower_lockers" checked> Showers & Lockers</label>
                    <label class="checkbox-item"><input type="checkbox" id="female_friendly"> Female Friendly (hard filter)</label>
                </div>
            </div>

            <div class="filter-group">
                <label for="sport_filters">Sports (comma-separated)</label>
                <input type="text" id="sport_filters" placeholder="yoga, fitness, weightlifting">
            </div>

            <div class="filter-group">
                <label for="equipment_filters">Equipment (comma-separated)</label>
                <input type="text" id="equipment_filters" placeholder="treadmill, squat rack">
            </div>

            <button id="find-btn">Find My Best Match</button>
        </section>

        <section id="results" class="results-grid">
            <div class="loading">Set your preferences and click "Find My Best Match" to see recommendations.</div>
        </section>
    </main>

    <script>
        const defaultLocation = [1.2994, 103.8458]; // Dhoby Ghaut / Orchard Central
        const appState = {
            userId: 'demo_user',
            preferredLocation: defaultLocation,
            profileLoaded: false
        };

        const userIdInput = document.getElementById('user_id');
        const profileStatus = document.getElementById('profile-status');
        const loadProfileBtn = document.getElementById('load-profile-btn');
        const findBtn = document.getElementById('find-btn');

        function setProfileStatus(message, isError = false) {
            profileStatus.textContent = message;
        }

        function readNumber(inputId, fallbackValue) {
            const rawValue = parseFloat(document.getElementById(inputId).value);
            return Number.isFinite(rawValue) ? rawValue : fallbackValue;
        }

        function readList(inputId) {
            const rawValue = document.getElementById(inputId).value || '';
            return rawValue
                .split(/[;,]/)
                .map(value => value.trim())
                .filter(value => value.length > 0);
        }

        async function loadProfile(userId) {
            const trimmedUserId = (userId || '').trim();
            if (!trimmedUserId) {
                setProfileStatus('Please enter a user ID.', true);
                return;
            }

            setProfileStatus(`Loading profile for ${trimmedUserId}...`);

            try {
                const response = await fetch(`/profile/${encodeURIComponent(trimmedUserId)}`);
                if (!response.ok) {
                    throw new Error(`Profile request failed with status ${response.status}`);
                }

                const profile = await response.json();
                if (!Array.isArray(profile.preferred_location) || profile.preferred_location.length !== 2) {
                    throw new Error('Profile response did not include a valid preferred_location.');
                }

                appState.userId = trimmedUserId;
                appState.preferredLocation = profile.preferred_location;
                appState.profileLoaded = true;
                userIdInput.value = trimmedUserId;
                setProfileStatus(`Loaded profile for ${trimmedUserId}.`);
            } catch (error) {
                appState.userId = trimmedUserId;
                appState.preferredLocation = defaultLocation;
                appState.profileLoaded = false;
                setProfileStatus(`Could not load profile for ${trimmedUserId}. Using default location.`, true);
            }
        }

        userIdInput.addEventListener('input', () => {
            appState.userId = userIdInput.value.trim();
            appState.profileLoaded = false;
            if (appState.userId) {
                setProfileStatus('Profile not loaded for this user ID yet.');
            } else {
                setProfileStatus('');
            }
        });

        loadProfileBtn.addEventListener('click', async () => {
            await loadProfile(userIdInput.value);
        });

        findBtn.addEventListener('click', async () => {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<div class="loading">Finding best matches...</div>';

            const currentUserId = userIdInput.value.trim() || 'demo_user';
            const payload = {
                user_id: currentUserId,
                budget_range: [0, readNumber('budget', 0)],
                preferred_location: appState.profileLoaded ? appState.preferredLocation : defaultLocation,
                fitness_goals: ['general_fitness'],
                access_24h: document.getElementById('access_24h').checked,
                requires_classes: document.getElementById('requires_classes').checked,
                requires_shower_lockers: document.getElementById('requires_shower_lockers').checked,
                female_friendly: document.getElementById('female_friendly').checked,
                sport_filters: readList('sport_filters'),
                equipment_filters: readList('equipment_filters'),
                max_travel_distance_km: readNumber('distance', 5)
            };

            try {
                const response = await fetch('/recommend', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                renderResults(data);
            } catch (error) {
                resultsDiv.innerHTML = '<div class="loading">Error: Could not connect to API. Make sure the server is running.</div>';
            }
        });

        async function initializeFromUrl() {
            const params = new URLSearchParams(window.location.search);
            const urlUserId = params.get('user_id');
            if (urlUserId) {
                userIdInput.value = urlUserId;
                await loadProfile(urlUserId);
                return;
            }

            appState.userId = userIdInput.value.trim() || 'demo_user';
            appState.preferredLocation = defaultLocation;
            appState.profileLoaded = false;
            setProfileStatus('Using default location until a profile is loaded.');
        }

        function renderResults(gyms) {
            const resultsDiv = document.getElementById('results');
            if (gyms.length === 0) {
                resultsDiv.innerHTML = '<div class="loading">No gyms found matching your criteria. Try increasing distance or budget.</div>';
                return;
            }

            resultsDiv.innerHTML = gyms.map(gym => `
                <div class="gym-card">
                    <div class="gym-info">
                        <div class="score-badge">Match: ${Math.round(gym.score * 100)}%</div>
                        <div class="gym-name">${gym.name}</div>
                        <div class="gym-meta">${gym.distance_km} km away • ${gym.explanation.budget > 0.9 ? 'Within Budget' : 'Pricey'}</div>
                    </div>
                    <div class="explanation">
                        <div>WHY THIS MATCH?</div>
                        ${renderExpBar('Distance', gym.explanation.distance)}
                        ${renderExpBar('Price', gym.explanation.budget)}
                        ${renderExpBar('Facilities', gym.explanation.facilities)}
                        ${renderExpBar('Rating', gym.explanation.rating)}
                    </div>
                </div>
            `).join('');
        }

        function renderExpBar(label, value) {
            return `
                <div class="exp-bar-container">
                    <div class="exp-label"><span>${label}</span><span>${Math.round(value * 100)}%</span></div>
                    <div class="exp-bar"><div class="exp-fill"></div></div>
                </div>
            `;
        }

        initializeFromUrl();
    </script>
</body>
</html>
