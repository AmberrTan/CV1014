<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymMatch — Find Your Perfect Gym</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        * { box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }
        body { background-color: var(--bg); color: var(--text-main); margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        
        header { background: white; border-bottom: 1px solid var(--border); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        header h1 { margin: 0; font-size: 1.5rem; color: var(--primary); }

        main { display: grid; grid-template-columns: 350px 1fr; gap: 2rem; padding: 2rem; flex: 1; max-width: 1400px; margin: 0 auto; width: 100%; }

        .filters { background: white; padding: 1.5rem; border-radius: 12px; border: 1px solid var(--border); height: fit-content; position: sticky; top: 2rem; }
        .filter-group { margin-bottom: 1.5rem; }
        label { display: block; font-weight: 600; margin-bottom: 0.5rem; font-size: 0.9rem; }
        input[type="number"], input[type="text"], select { width: 100%; padding: 0.6rem; border: 1px solid var(--border); border-radius: 6px; }
        
        .checkbox-group { display: grid; grid-template-columns: 1fr; gap: 0.5rem; }
        .checkbox-item { display: flex; align-items: center; gap: 0.5rem; font-size: 0.9rem; cursor: pointer; }

        button#find-btn { width: 100%; background: var(--primary); color: white; border: none; padding: 0.8rem; border-radius: 6px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        button#find-btn:hover { background: var(--primary-hover); }

        .results-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; }
        .gym-card { background: white; border-radius: 12px; border: 1px solid var(--border); overflow: hidden; transition: transform 0.2s, box-shadow 0.2s; display: flex; flex-direction: column; }
        .gym-card:hover { transform: translateY(-4px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .gym-info { padding: 1.5rem; flex: 1; }
        .gym-name { font-size: 1.25rem; font-weight: 700; margin-bottom: 0.5rem; }
        .gym-meta { color: var(--text-muted); font-size: 0.85rem; margin-bottom: 1rem; }
        .score-badge { display: inline-block; background: #dcfce7; color: #166534; padding: 0.25rem 0.75rem; border-radius: 999px; font-weight: 700; font-size: 0.85rem; margin-bottom: 1rem; }
        
        .explanation { border-top: 1px solid var(--border); padding: 1rem; background: #f1f5f9; }
        .exp-bar-container { margin-bottom: 0.5rem; }
        .exp-label { font-size: 0.75rem; display: flex; justify-content: space-between; margin-bottom: 2px; }
        .exp-bar { height: 6px; background: #e2e8f0; border-radius: 3px; overflow: hidden; }
        .exp-fill { height: 100%; background: var(--primary); border-radius: 3px; }

        .loading { text-align: center; grid-column: 1 / -1; padding: 4rem; color: var(--text-muted); }
        
        @media (max-width: 900px) {
            main { grid-template-columns: 1fr; }
            .filters { position: static; }
        }
    </style>
</head>
<body>
    <header>
        <h1>GymMatch SG</h1>
        <div>Singapore, Central</div>
    </header>

    <main>
        <section class="filters">
            <h2 style="margin-top: 0; font-size: 1.25rem;">Your Preferences</h2>
            
            <div class="filter-group">
                <label>Max Monthly Budget (S$)</label>
                <input type="number" id="budget" value="150" min="20">
            </div>

            <div class="filter-group">
                <label>Max Distance (km)</label>
                <input type="number" id="distance" value="5" min="1">
            </div>

            <div class="filter-group">
                <label>Requirements</label>
                <div class="checkbox-group">
                    <label class="checkbox-item"><input type="checkbox" id="access_24h" checked> 24/7 Access</label>
                    <label class="checkbox-item"><input type="checkbox" id="requires_classes"> Group Classes</label>
                    <label class="checkbox-item"><input type="checkbox" id="requires_shower_lockers" checked> Showers & Lockers</label>
                    <label class="checkbox-item"><input type="checkbox" id="female_friendly"> Female Friendly</label>
                </div>
            </div>

            <button id="find-btn">Find My Best Match</button>
        </section>

        <section id="results" class="results-grid">
            <div class="loading">Set your preferences and click "Find My Best Match" to see recommendations.</div>
        </section>
    </main>

    <script>
        document.getElementById('find-btn').addEventListener('click', async () => {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<div class="loading">Finding best matches...</div>';

            const payload = {
                user_id: "demo_user",
                budget_range: [0, parseFloat(document.getElementById('budget').value)],
                preferred_location: [1.2994, 103.8458], // Dhoby Ghaut / Orchard Central
                fitness_goals: ["general_fitness"],
                access_24h: document.getElementById('access_24h').checked,
                requires_classes: document.getElementById('requires_classes').checked,
                requires_shower_lockers: document.getElementById('requires_shower_lockers').checked,
                female_friendly: document.getElementById('female_friendly').checked,
                max_travel_distance_km: parseFloat(document.getElementById('distance').value)
            };

            try {
                const response = await fetch('/recommend', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                renderResults(data);
            } catch (error) {
                resultsDiv.innerHTML = '<div class="loading" style="color: #ef4444;">Error: Could not connect to API. Make sure the server is running.</div>';
            }
        });

        function renderResults(gyms) {
            const resultsDiv = document.getElementById('results');
            if (gyms.length === 0) {
                resultsDiv.innerHTML = '<div class="loading">No gyms found matching your criteria. Try increasing distance or budget.</div>';
                return;
            }

            resultsDiv.innerHTML = gyms.map(gym => `
                <div class="gym-card">
                    <div class="gym-info">
                        <div class="score-badge">Match: ${Math.round(gym.score * 100)}%</div>
                        <div class="gym-name">${gym.name}</div>
                        <div class="gym-meta">${gym.distance_km} km away • ${gym.explanation.budget > 0.9 ? 'Within Budget' : 'Pricey'}</div>
                    </div>
                    <div class="explanation">
                        <div style="font-size: 0.75rem; font-weight: 600; margin-bottom: 0.5rem; color: var(--text-muted);">WHY THIS MATCH?</div>
                        ${renderExpBar('Distance', gym.explanation.distance)}
                        ${renderExpBar('Price', gym.explanation.budget)}
                        ${renderExpBar('Facilities', gym.explanation.facilities)}
                        ${renderExpBar('Rating', gym.explanation.rating)}
                    </div>
                </div>
            `).join('');
        }

        function renderExpBar(label, value) {
            return `
                <div class="exp-bar-container">
                    <div class="exp-label"><span>${label}</span><span>${Math.round(value * 100)}%</span></div>
                    <div class="exp-bar"><div class="exp-fill" style="width: ${value * 100}%"></div></div>
                </div>
            `;
        }
    </script>
</body>
</html>
