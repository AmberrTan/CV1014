[project]
name = "gym-recommendation-system"
version = "0.1.0"
description = "Console-based gym and fitness centre recommendation system"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115.0",
    "typer>=0.16.0",
    "uvicorn>=0.34.0",
]

[dependency-groups]
dev = [
    "ruff>=0.11.0",
    "ty>=0.0.1a16",
]

[project.scripts]
gym-recommender = "gym_recommender.main:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/gym_recommender"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "B"]

[tool.ty.environment]
python = "./.venv"
